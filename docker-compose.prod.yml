version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-tutoronline}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    image: cutezerg/tutoronline-backend:latest
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-tutoronline}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-key}
    volumes:
      - backend_uploads:/app/uploads
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    image: cutezerg/tutoronline-frontend:latest
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://your-server-ip:8000
      - NEXT_PUBLIC_LIVEKIT_URL=${NEXT_PUBLIC_LIVEKIT_URL}
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
  backend_uploads:
